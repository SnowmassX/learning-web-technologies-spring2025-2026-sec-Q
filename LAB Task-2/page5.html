<!DOCTYPE html>
<html>

<head>
  <title>Hobby</title>
</head>

<body>

  <form onsubmit="return validateHobby()">
    <input type="checkbox" name="hobby"> Music
    <input type="checkbox" name="hobby"> Sports
    <input type="checkbox" name="hobby"> Gaming
    <input type="submit">
  </form>

  <script>
    function validateHobby() {
      let hobby = document.getElementsByName("hobby");

      for (let i = 0; i < hobby.length; i++) {
        if (hobby[i].checked) {
          return true;
        }
      }

      alert("Select at least one hobby");
      return false;
    }
  </script>

</body>

</html>
