<!DOCTYPE html>
<html>

<head>
  <title>Full Validation Form</title>
</head>

<body>

  <form onsubmit="return validateForm()">

    Name: <input type="text" id="name"><br><br>

    Email: <input type="text" id="email"><br><br>

    Gender:
    <input type="radio" name="gender"> Male
    <input type="radio" name="gender"> Female<br><br>

    DOB:
    DD <input type="text" id="dd" size="2">
    MM <input type="text" id="mm" size="2">
    YYYY <input type="text" id="yyyy" size="4"><br><br>

    Hobbies:
    <input type="checkbox" name="hobby"> Music
    <input type="checkbox" name="hobby"> Sports
    <input type="checkbox" name="hobby"> Gaming<br><br>

    Department:
    <select id="dept">
      <option value="">Select</option>
      <option value="CSE">CSE</option>
      <option value="EEE">EEE</option>
    </select><br><br>

    User ID: <input type="text" id="userid"><br><br>

    Picture: <input type="file" id="pic"><br><br>

    <input type="submit" value="Submit">

  </form>

  <script>
    function validateForm() {

      let name = document.getElementById("name").value.trim();
      if (name === "") {
        alert("Name cannot be empty");
        return false;
      }

      let words = name.split(" ");
      if (words.length < 2) {
        alert("Name must contain at least two words");
        return false;
      }

      let firstChar = name[0];
      if (!((firstChar >= 'A' && firstChar <= 'Z') || (firstChar >= 'a' && firstChar <= 'z'))) {
        alert("Name must start with a letter");
        return false;
      }

      for (let i = 0; i < name.length; i++) {
        let ch = name[i];
        if (
          (ch >= 'A' && ch <= 'Z') ||
          (ch >= 'a' && ch <= 'z') ||
          ch === '.' || ch === '-' || ch === ' '
        ) continue;
        else {
          alert("Invalid character in name");
          return false;
        }
      }

      let email = document.getElementById("email").value;
      if (email === "") {
        alert("Email cannot be empty");
        return false;
      }

      let atPos = email.indexOf("@");
      let dotPos = email.lastIndexOf(".");
      if (atPos <= 0 || dotPos <= atPos + 1 || dotPos === email.length - 1) {
        alert("Invalid email format");
        return false;
      }

      let gender = document.getElementsByName("gender");
      let genderSelected = false;
      for (let i = 0; i < gender.length; i++) {
        if (gender[i].checked) {
          genderSelected = true;
          break;
        }
      }
      if (!genderSelected) {
        alert("Select gender");
        return false;
      }

      let dd = document.getElementById("dd").value;
      let mm = document.getElementById("mm").value;
      let yyyy = document.getElementById("yyyy").value;

      if (dd === "" || mm === "" || yyyy === "") {
        alert("Date fields cannot be empty");
        return false;
      }

      dd = Number(dd);
      mm = Number(mm);
      yyyy = Number(yyyy);

      if (dd < 1 || dd > 31) {
        alert("Invalid day");
        return false;
      }

      if (mm < 1 || mm > 12) {
        alert("Invalid month");
        return false;
      }

      if (yyyy < 1900 || yyyy > 2016) {
        alert("Invalid year");
        return false;
      }

      let hobby = document.getElementsByName("hobby");
      let hobbySelected = false;

      for (let i = 0; i < hobby.length; i++) {
        if (hobby[i].checked) {
          hobbySelected = true;
          break;
        }
      }

      if (!hobbySelected) {
        alert("Select at least one hobby");
        return false;
      }

      let dept = document.getElementById("dept").value;
      if (dept === "") {
        alert("Select department");
        return false;
      }

      let userid = document.getElementById("userid").value;
      if (userid === "") {
        alert("User ID cannot be empty");
        return false;
      }

      if (isNaN(userid) || Number(userid) <= 0) {
        alert("User ID must be a positive number");
        return false;
      }

      let pic = document.getElementById("pic").value;
      if (pic === "") {
        alert("Picture cannot be empty");
        return false;
      }

      alert("Form submitted successfully!");
      return true;
    }
  </script>

</body>

</html>
